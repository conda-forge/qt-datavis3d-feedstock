context:
  version: "6.10.2"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-datavis3d
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtdatavis3d-everywhere-src-${{ version }}.tar.xz
  md5: 675ce6fcd1bea6e7bbd8e00802aee0f8

build:
  number: 1

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - if: build_platform != target_platform
      then: qt6-main ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
    - if: linux
      then:
        - libgl-devel
        - libegl-devel
        - libopengl-devel
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-datavis3d', upper_bound='x.x') }}

tests:
  - script:
    - if: unix
      then:
        - test -d $PREFIX/include/qt6/QtDataVisualization
        - test -f $PREFIX/lib/libQt6DataVisualization${SHLIB_EXT}
      else:
        - if not exist %PREFIX%\\Library\\include\\qt6\\QtDataVisualization exit 1
        - if not exist %PREFIX%\\Library\\lib\\Qt6DataVisualization.lib exit 1
        - if not exist %PREFIX%\\Library\\bin\\Qt6DataVisualization.dll exit 1
about:
  homepage: http://qt-project.org
  license: GPL-3.0-only
  license_file: LICENSES/GPL-3.0-only.txt
  summary: Qt is a cross-platform application and UI framework.
  description: |
    Qt helps you create connected devices, UIs & applications that run
    anywhere on any device, on any operating system at any time.
  documentation: http://doc.qt.io/
  repository: https://github.com/qt/qtdatavis3d

extra:
  recipe-maintainers:
    - jschueller
  feedstock-name: qt-datavis3d
